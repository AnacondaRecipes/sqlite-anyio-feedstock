{% set name = "sqlite-anyio" %}
{% set version = "0.2.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: d68b51a18c01a7dfa9cedbc319871ce77ab3ed0822518fb32810bb465b52d761

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<310]

requirements:
  host:
    - python
    - pip
    - uv-build
  run:
    - python
    - anyio >=4.0,<5.0
    - typing_extensions >=4.15.0

test:
  source_files:
    - tests
  imports:
    - sqlite_anyio
  commands:
    - pip check
    - pytest -v tests
  requires:
    - pip
    - pytest >=9,<10
    - trio >=0.32.0,<1

about:
  home: https://github.com/davidbrochart/sqlite-anyio
  summary: Asynchronous client for SQLite using AnyIO
  license_file: LICENSE
  license: MIT
  license_family: MIT
  dev_url: https://github.com/davidbrochart/sqlite-anyio
  doc_url: https://github.com/davidbrochart/sqlite-anyio/blob/main/README.md

extra:
  recipe-maintainers:
    - davidbrochart
